<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>《伤寒论》研读支持系统 V1.0</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <div id="page-shell" class="page-shell">
      <div class="page-toolbar" aria-label="页面顶部工具栏">
        <div class="page-toolbar-actions" aria-label="页面操作">
          <button
            id="sidebar-toggle-button"
            class="page-icon-button sidebar-toggle"
            type="button"
            aria-controls="history-sidebar"
            aria-expanded="true"
            aria-label="收起历史会话侧栏"
            title="收起历史会话侧栏"
          >
            <span id="sidebar-toggle-label" class="sr-only">收起历史会话侧栏</span>
            <svg
              class="page-action-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M12.8311 1.67383C14.7468 1.71287 16.493 1.88034 17.9043 2.06934C20.0999 2.36353 21.7899 4.04161 22.0908 6.23633C22.3072 7.81681 22.4951 9.81754 22.4951 12.001L22.4863 12.8105C22.4475 14.6772 22.2802 16.381 22.0908 17.7637L22.0586 17.9678C21.6839 20.0619 20.0314 21.6457 17.9043 21.9307L17.2793 22.0098C15.7757 22.1906 13.9611 22.335 12 22.335L11.1689 22.3262C9.52677 22.2927 8.0095 22.1647 6.7207 22.0098L6.0957 21.9307C3.96847 21.6457 2.31512 20.062 1.94043 17.9678L1.9082 17.7637C1.71887 16.381 1.55253 14.6772 1.51367 12.8105L1.50488 12.001C1.50488 9.81755 1.69179 7.81681 1.9082 6.23633C2.20909 4.0415 3.89993 2.36347 6.0957 2.06934C7.70871 1.85334 9.75883 1.66504 12 1.66504L12.8311 1.67383ZM12 3.26465C11.1519 3.26465 10.3313 3.29392 9.55273 3.34082V20.6582C10.3313 20.7051 11.1519 20.7354 12 20.7354C14.1542 20.7353 16.1312 20.5537 17.6914 20.3447C19.1775 20.1457 20.3032 19.0244 20.5059 17.5459C20.7148 16.0197 20.8945 14.0952 20.8945 12.001C20.8945 9.90634 20.7149 7.9805 20.5059 6.4541C20.3032 4.97563 19.1775 3.85428 17.6914 3.65527C16.1312 3.44635 14.1542 3.26465 12 3.26465ZM7.95312 3.4668C7.36648 3.52363 6.81548 3.5874 6.30859 3.65527C4.82252 3.85428 3.69678 4.97563 3.49414 6.4541C3.28514 7.9805 3.10449 9.90633 3.10449 12.001C3.10455 14.0952 3.28518 16.0197 3.49414 17.5459C3.69678 19.0244 4.82251 20.1457 6.30859 20.3447C6.81545 20.4126 7.36652 20.4754 7.95312 20.5322V3.4668Z"
              />
            </svg>
          </button>

          <button
            id="new-chat-button"
            class="page-icon-button new-chat-button"
            type="button"
            aria-label="新建对话"
            title="新建对话"
          >
            <span class="sr-only">新建对话</span>
            <svg
              class="page-action-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M11.9995 1.9314C12.4494 1.93151 12.8148 2.29678 12.8148 2.74666C12.8145 3.19632 12.4492 3.56087 11.9995 3.56098C10.1902 3.56099 8.52242 3.70673 7.17162 3.88109C5.43247 4.1056 4.10513 5.43294 3.88062 7.17209C3.70627 8.52283 3.56052 10.1908 3.56051 12C3.56054 13.8093 3.70625 15.4781 3.88062 16.8288C4.10549 18.5675 5.43278 19.8954 7.17162 20.1198C8.52238 20.2942 10.1903 20.439 11.9995 20.439C13.8089 20.439 15.4775 20.2942 16.8284 20.1198C18.567 19.8952 19.8946 18.5674 20.1194 16.8288C20.2937 15.4781 20.4385 13.8093 20.4385 12C20.4387 11.5503 20.8032 11.1859 21.2529 11.1857C21.7027 11.1858 22.068 11.5502 22.0681 12C22.0681 13.8936 21.9161 15.6331 21.7349 17.0366C21.4154 19.51 19.5095 21.416 17.0362 21.7354C15.6325 21.9166 13.8932 22.0686 11.9995 22.0686C10.1058 22.0686 8.36656 21.9166 6.96289 21.7354C4.48948 21.4161 2.58364 19.51 2.26414 17.0366C2.08297 15.6331 1.93189 13.8936 1.93186 12C1.93187 10.1063 2.08297 8.36699 2.26414 6.96336C2.58346 4.48977 4.4893 2.58393 6.96289 2.26461C8.36657 2.08342 10.1057 1.93141 11.9995 1.9314Z"
              />
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M16.1011 3.40373C17.3529 2.27275 19.2863 2.31078 20.4928 3.51699L20.607 3.6368C21.7011 4.84834 21.7005 6.69736 20.6061 7.90872L20.4938 8.0276L14.157 14.3634L14.0279 14.487C13.7632 14.728 13.4661 14.9311 13.1452 15.0898L12.9833 15.1646L10.1154 16.4198C8.56697 17.0974 6.99293 15.593 7.53198 14.0452L7.59095 13.8954L8.84519 11.0266C9.01288 10.6435 9.24184 10.2905 9.52286 9.98197L9.64735 9.85374L15.9832 3.51699L16.1011 3.40373ZM19.3406 4.66921C18.7316 4.06057 17.7445 4.06071 17.1354 4.66921L10.7996 11.006C10.6053 11.2003 10.4483 11.4291 10.3381 11.6808L9.08294 14.5487C9.04688 14.6313 9.05012 14.684 9.05767 14.7191C9.06736 14.7637 9.09391 14.8189 9.14284 14.8679C9.19192 14.9169 9.24701 14.9435 9.29167 14.9531C9.32682 14.9606 9.3794 14.963 9.46202 14.9269L12.3299 13.6726C12.5816 13.5625 12.8105 13.4055 13.0048 13.2112L19.3416 6.87537C19.9502 6.26617 19.9496 5.27819 19.3406 4.66921Z"
              />
            </svg>
          </button>

          <label class="page-icon-button evidence-toggle-label" title="切换原始证据标记 [E#]">
            <input type="checkbox" id="evidence-toggle-checkbox">
            <span class="evidence-toggle-text">[E]</span>
          </label>
        </div>

        <div class="page-toolbar-center">
          <h2 id="conversation-title" class="page-toolbar-title">新对话</h2>
          <p id="conversation-subtitle" class="page-toolbar-subtitle"></p>
        </div>

        <div class="page-toolbar-feedback" aria-label="页面状态">
          <p id="status-text" class="sr-only" aria-live="polite">正在初始化聊天界面…</p>
          <p id="error-text" class="error-text" aria-live="polite"></p>
        </div>
      </div>

      <button
        id="sidebar-backdrop"
        class="sidebar-backdrop"
        type="button"
        hidden
        aria-label="关闭历史会话侧栏"
      ></button>

      <div id="app-shell" class="app-shell">
        <aside id="history-sidebar" class="history-sidebar" aria-label="历史对话">
          <div class="sidebar-head">
            <div class="sidebar-heading">
              <h1>历史对话</h1>
            </div>
          </div>

          <div class="sidebar-search">
            <div class="sidebar-search-shell">
              <div class="history-search-input">
                <svg
                  class="history-search-icon"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <path
                    d="M10.5 4.75a5.75 5.75 0 1 0 0 11.5a5.75 5.75 0 0 0 0-11.5Zm-7.25 5.75a7.25 7.25 0 1 1 13.06 4.39l4.57 4.57a.75.75 0 1 1-1.06 1.06l-4.57-4.57A7.25 7.25 0 0 1 3.25 10.5Z"
                    fill="currentColor"
                  />
                </svg>
                <input
                  id="history-search"
                  type="search"
                  aria-label="搜索历史对话"
                  placeholder="搜索标题或消息内容"
                  autocomplete="off"
                />
              </div>
            </div>

            <div class="history-meta-row">
              <p id="history-section-title" class="history-section-title">最近会话</p>
              <p id="history-status" class="history-status" aria-live="polite">正在加载历史会话…</p>
            </div>
          </div>

          <section class="sidebar-list-shell">
            <div id="history-loading" class="sidebar-state-card">
              <p class="state-title">正在加载历史会话</p>
              <p class="state-copy">列表载入后，你可以从左侧直接恢复旧会话并继续聊天。</p>
            </div>

            <div id="history-empty" class="sidebar-state-card" hidden>
              <p class="state-title">还没有历史会话</p>
              <p class="state-copy">点击上方 <code>新建对话</code>，或者直接在右侧输入问题开始第一轮会话。</p>
            </div>

            <div id="history-no-results" class="sidebar-state-card" hidden>
              <p class="state-title">没有匹配结果</p>
              <p class="state-copy">当前搜索没有命中标题或消息内容，可以尝试缩短关键词后重试。</p>
            </div>

            <ul id="conversation-list" class="conversation-list" aria-live="polite"></ul>
          </section>
        </aside>

        <main class="chat-panel">
          <section id="chat-body" class="chat-body" aria-label="当前会话">
            <section id="conversation-loading" class="main-state-card" hidden>
              <p class="state-title">正在加载会话</p>
              <p class="state-copy">正在恢复完整聊天记录，请稍候。</p>
            </section>

            <section id="conversation-empty" class="main-state-card" hidden></section>

            <section id="message-feed" class="message-feed" hidden></section>
          </section>

          <footer class="composer-shell">
            <section class="composer-panel" aria-label="底部输入区">
              <form id="query-form" class="composer-form">
                <textarea
                  id="query-input"
                  name="query"
                  aria-label="当前问题"
                  rows="2"
                  placeholder="输入问题"
                ></textarea>

                <div class="composer-actions">
                  <button id="submit-button" type="submit">发送</button>
                </div>
              </form>

              <details class="sample-queries">
                <summary class="sample-summary">查看示例问题</summary>
                <div class="sample-drawer">
                  <p class="sample-title">可快速填充的示例问题</p>
                  <div class="sample-list">
                    <button class="sample-chip" type="button" data-query="黄连汤方的条文是什么？">
                      黄连汤方
                    </button>
                    <button
                      class="sample-chip"
                      type="button"
                      data-query="烧针益阳而损阴是什么意思？"
                    >
                      烧针益阳而损阴
                    </button>
                    <button class="sample-chip" type="button" data-query="书中有没有提到量子纠缠？">
                      量子纠缠
                    </button>
                    <button
                      class="sample-chip"
                      type="button"
                      data-query="桂枝加附子汤方和桂枝加厚朴杏子汤方的区别是什么？"
                    >
                      方剂比较
                    </button>
                  </div>
                  <p class="sample-note">点击后只填充输入框，不会自动发送。</p>
                </div>
              </details>
            </section>
          </footer>
        </main>
      </div>
    </div>

    <script type="module" src="/frontend/app.js"></script>
  </body>
</html>

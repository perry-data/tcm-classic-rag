name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deployment
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 "${PROD_USER}@${PROD_HOST}" 'bash /opt/tcm-classic-rag/deploy/update_server.sh'

      - name: Verify deployed commit
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_SHA="$(ssh -i ~/.ssh/id_ed25519 "${PROD_USER}@${PROD_HOST}" 'cd /opt/tcm-classic-rag && git rev-parse HEAD')"
          test "$REMOTE_SHA" = "$EXPECTED_SHA"

      - name: Verify public endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --retry 5 --retry-delay 3 "http://${PROD_HOST}/" >/dev/null
